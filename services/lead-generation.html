 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exclusive Lead Generation for Contractors | Your Online Squad</title>
    <meta name="description" content="Stop buying shared leads. We build proprietary lead generation systems that deliver exclusive, highly qualified calls directly to elite contractors.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #05070a; --bg-secondary: #0b0f1a;
            --purple: #7c3aed; --orange: #f97316; 
            --card: rgba(22, 28, 45, 0.6); --border: rgba(45, 55, 72, 0.5); 
            --text-dim: #94a3b8; --white: #ffffff;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--white); line-height: 1.8; overflow-x: hidden; padding-top: 100px; }
        .container { width: 100%; max-width: 1400px; margin: 0 auto; padding: 0 40px; }
        h1, h2, h3, h4 { text-transform: uppercase; font-weight: 900; line-height: 1.1; letter-spacing: -1px; }
        .highlight { color: var(--orange); }

        .fluid-h2 { font-size: clamp(2.2rem, 8vw, 3.5rem); margin-bottom: 25px; }

        header { 
            background: rgba(5, 7, 10, 0.95); border-bottom: 1px solid var(--border); 
            height: 100px; position: fixed; width: 100%; top: 0; left: 0; z-index: 9999;
            display: flex; align-items: center; backdrop-filter: blur(12px);
        }
        nav { width: 100%; max-width: 1400px; margin: 0 auto; padding: 0 40px; display: flex; justify-content: space-between; align-items: center; position: relative; }
        .logo { font-size: 1.6rem; font-weight: 900; color: #fff; text-decoration: none; letter-spacing: -1px; z-index: 10000; }
        .logo span { color: var(--orange); }

        ul { list-style: none; }
        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-links > li > a:not(.btn) { color: #fff; text-decoration: none; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; padding: 40px 0; display: inline-block; transition: 0.3s; }
        .nav-links > li > a:not(.btn):hover { color: var(--orange); }

        .mega-dropdown { position: relative; }
        .mega-menu {
            position: absolute; top: 100px; left: 50%; transform: translateX(-50%);
            width: 800px; background: var(--bg-secondary); border: 1px solid var(--border);
            border-top: 3px solid var(--orange); border-radius: 0 0 12px 12px;
            padding: 30px; display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            grid-template-columns: repeat(3, 1fr); gap: 20px;
        }
        .mega-dropdown:hover .mega-menu { display: grid; }
        .services-menu { width: 300px; grid-template-columns: 1fr; left: 0; transform: none; }
        .mega-menu li a { color: var(--text-dim); text-decoration: none; font-size: 0.9rem; font-weight: 500; padding: 8px 10px; display: block; border-radius: 4px; transition: 0.2s; text-transform: capitalize; }
        .mega-menu li a:hover { background: rgba(255,255,255,0.05); color: #fff; padding-left: 15px; }

        .btn { 
            background: linear-gradient(135deg, var(--purple), var(--orange)); color: #fff !important; 
            padding: 14px 30px; border-radius: 6px; font-weight: 900; font-size: 0.85rem; 
            text-transform: uppercase; text-decoration: none; transition: 0.4s; border: none; display: inline-block;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(249, 115, 22, 0.4); }
        .menu-toggle { display: none; color: #fff; cursor: pointer; z-index: 10000; user-select: none; }

        section { padding: 140px 0; border-bottom: 1px solid var(--border); }
        .grid-split { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
        .grid-split.reverse { direction: rtl; } .grid-split.reverse > * { direction: ltr; }
        .copy-heavy p { margin-bottom: 25px; font-size: 1.15rem; color: var(--text-dim); line-height: 1.8; }

        .hero { 
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at top left, rgba(124, 58, 237, 0.15) 0%, transparent 50%),
                linear-gradient(rgba(249, 115, 22, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(249, 115, 22, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            padding: 160px 0 120px; border: none; 
        }
        .hero h1 { font-size: clamp(3rem, 6vw, 5.5rem); margin-bottom: 30px; line-height: 1; }
        .hero p { font-size: 1.25rem; color: var(--text-dim); max-width: 600px; margin-bottom: 40px; }

        .visual-asset {
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed rgba(249, 115, 22, 0.5);
            border-radius: 20px;
            aspect-ratio: 4/3;
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5), 0 20px 40px rgba(0,0,0,0.4);
            position: relative; overflow: hidden;
            backdrop-filter: blur(10px);
            z-index: 2;
        }
        .visual-asset::before {
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 60%; height: 60%; background: var(--orange); filter: blur(100px); opacity: 0.15; z-index: -1;
        }
        .asset-label {
            color: var(--orange); font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
            font-size: 0.9rem; text-align: center; padding: 15px 25px; border: 1px solid rgba(249, 115, 22, 0.3); border-radius: 8px;
            background: rgba(11, 15, 26, 0.8);
            animation: pulse 3s infinite;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(249, 115, 22, 0); } 100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); } }

        .float-tag {
            position: absolute; background: rgba(11, 15, 26, 0.9); border: 1px solid var(--orange);
            color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 0.85rem; font-weight: 700;
            backdrop-filter: blur(5px); z-index: 5; box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            animation: float 5s ease-in-out infinite reverse;
        }
        .tag-1 { top: 10%; right: -5%; animation-delay: 0s; }
        .tag-2 { bottom: 15%; left: -5%; animation-delay: 1s; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0px); } }

        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin-top: 40px; }
        .card { background: var(--card); padding: 40px; border: 1px solid var(--border); border-radius: 12px; transition: 0.3s; }
        .card:hover { border-color: rgba(249, 115, 22, 0.5); transform: translateY(-5px); }
        .card h3 { color: #fff; margin-bottom: 15px; font-size: 1.4rem; }

        .faq-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 60px; }
        .faq-box { background: var(--bg-secondary); padding: 40px; border-radius: 12px; border-top: 2px solid var(--orange); border: 1px solid var(--border); }
        .faq-box h4 { font-size: 1.25rem; margin-bottom: 15px; color: #fff; line-height: 1.4; text-transform: none; font-weight: 700; }
        .faq-box p { color: var(--text-dim); font-size: 1.05rem; }
        .faq-full { grid-column: 1 / -1; }

        footer { background: var(--bg-secondary); padding: 100px 0 40px; border-top: 1px solid var(--border); }
        .footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 60px; margin-bottom: 60px; }
        .footer-col h4 { color: #fff; margin-bottom: 25px; font-size: 1.1rem; }
        .footer-col p { color: var(--text-dim); margin-bottom: 15px; font-size: 1rem; }
        .footer-col ul { list-style: none; padding: 0; }
        .footer-col ul li { margin-bottom: 15px; }
        .footer-col ul li a { color: var(--text-dim); text-decoration: none; transition: 0.3s; }
        .footer-col ul li a:hover { color: var(--orange); }
        .footer-bottom { text-align: center; padding-top: 40px; border-top: 1px solid var(--border); color: #4a5568; font-size: 0.9rem; }

        @media (max-width: 1024px) {
            .container { padding: 0 25px; }
            .grid-split, .grid-split.reverse { grid-template-columns: 1fr; gap: 60px; text-align: center; }
            .hero p { margin: 0 auto 40px; }
            .grid-split.reverse { direction: ltr; } 
            .grid-3, .faq-grid { grid-template-columns: 1fr; }
            .footer-grid { grid-template-columns: 1fr 1fr; }
            
            .menu-toggle { display: block; position: absolute; right: 25px; top: 30px; font-size: 2.2rem; line-height: 1; }
            nav { justify-content: flex-start; } 

            .nav-links { 
                position: fixed; top: 100px; left: 0; width: 100%; height: calc(100vh - 100px);
                background: rgba(5, 7, 10, 0.98); flex-direction: column; justify-content: flex-start;
                gap: 0; padding: 20px 0; display: none; overflow-y: auto;
            }
            .nav-links.active { display: flex; }
            .nav-links > li { width: 100%; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
            .nav-links > li > a:not(.btn) { padding: 25px; display: block; font-size: 1.1rem; }

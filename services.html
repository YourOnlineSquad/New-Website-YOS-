 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Marketing for Contractors | Your Online Squad</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --yellow: #ffcc00; --blue: #007bff; --text: #1a1a1a; }
        body { font-family: 'Inter', sans-serif; background: #fff; color: var(--text); margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        
        /* Navigation */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #f0f0f0; }
        .logo { height: 50px; }
        
        /* Hero Section */
        .hero { padding: 100px 0; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
        h1 { font-family: 'Fraunces', serif; font-size: 52px; line-height: 1.1; margin-bottom: 25px; }
        .highlight { border-bottom: 6px solid var(--yellow); }
        .btn-yellow { background: var(--yellow); padding: 16px 32px; border-radius: 8px; font-weight: 800; text-decoration: none; color: #000; display: inline-block; }
        
        /* SEO Content Section */
        .content-block { padding: 80px 0; background: #f9f9f9; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }
        .card { background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="/"><img src="https://youronlinesquad.com/wp-content/uploads/2024/02/cropped-Your-Online-Squad-Logo-1.png" class="logo"></a>
            <div class="nav-right">
                <span style="color:var(--blue); font-weight:700; margin-right:20px;">(714) 406-4065</span>
                <a href="/contact" class="btn-yellow">Brief Your Project</a>
            </div>
        </nav>

        <section class="hero">
            <div class="hero-text">
                <h1>Dominating the Map for <span class="highlight">Contractors.</span></h1>
                <p>Stop settling for stagnant growth. We follow strict Google guidelines to build organic success for local contractors through custom code and elite backlinking.</p>
                <a href="/contact" class="btn-yellow">Get More Leads</a>
            </div>
            <div class="hero-img">
                <img src="https://images.unsplash.com/photo-1581094794329-c8112a89af12?auto=format&fit=crop&q=80&w=800" style="width:100%; border-radius:20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);">
            </div>
        </section>
    </div>
</body>
</html>
